  auth_database:
    container_name: auth-postgres-prod
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME?missing db name}
      POSTGRES_USER: ${DB_USERNAME?missing db username}
      POSTGRES_PASSWORD: ${DB_PASSWORD?missing db password}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default_network
    ports:
      - ${DB_PORT?missing app port}:${DB_PORT?missing app port}

  auth_app:
    container_name: auth-app-prod
    image: 758280076486.dkr.ecr.eu-central-1.amazonaws.com/focusboard/auth:latest
    environment:
      DB_HOST: auth_database
      DB_PORT: ${DB_PORT?missing db port}
      DB_NAME: ${DB_NAME?missing db name}
      DB_USERNAME: ${DB_USERNAME?missing db username}
      DB_PASSWORD: ${DB_PASSWORD?missing db password}
      JWT_SECRET: ${JWT_SECRET?missing jwt secret}
      PEPPER: ${PEPPER?missing pepper}
      PORT: ${PORT?missing app port}
      GRPC_PORT: ${GRPC_PORT?missing grpc port}
      CORS_ORIGIN: "http://localhost:3000,http://localhost:8088"
    depends_on:
      auth_database:
        condition: service_healthy
    ports:
      - "${PORT}:${PORT}"
      - "${GRPC_PORT}:${GRPC_PORT}"
    networks:
      - default_network

  focus:
    container_name: focus-app-prod
    image: 758280076486.dkr.ecr.eu-central-1.amazonaws.com/focusboard/focus:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:8080"
    environment:
      QUARKUS_PROFILE: docker
      QUARKUS_HTTP_CORS_ENABLED: "true"
      QUARKUS_HTTP_CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
      QUARKUS_HTTP_CORS_METHODS: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
      QUARKUS_HTTP_CORS_HEADERS: "accept,authorization,content-type,x-requested-with,x-csrf-token,cookie"
      QUARKUS_HTTP_CORS_ACCESS_CONTROL_ALLOW_CREDENTIALS: "true"
    restart: unless-stopped
    networks:
      - default_network

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: focus
      POSTGRES_USER: focus
      POSTGRES_PASSWORD: focus
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focus -d focus"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default_network

  frontend:
    container_name: frontend-app-prod
    image: 758280076486.dkr.ecr.eu-central-1.amazonaws.com/focusboard/frontend:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      AUTH_API_BASE_URL: "http://localhost:4000"
      API_BASE_URL: "http://localhost:8088"
      APP_VERSION: "local"
    depends_on:
      - focus
      - auth_app
    networks:
      - default_network
    restart: unless-stopped

volumes:
  auth_db_data:
  postgres_data:

networks:
  default_network:
    driver: bridge