events {
  worker_connections 1024;
}

http {
  # Connection upgrade mapping for WebSocket support
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Disable gzip globally to prevent RSC corruption
  gzip off;

  upstream frontend {
    server frontend:3000;
  }

  upstream auth {
    server auth_app:80;
  }

  upstream focus {
    server focus:8088;
  }

  server {
    listen 80;
    server_name localhost;

    # Auth API routes
    location /api/auth/ {
      proxy_pass http://auth/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Focus API routes
    location /api/focus/ {
      proxy_pass http://focus/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend routes (catch-all, must be last)
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;

      # WebSocket support
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # Standard proxy headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Critical: Pass Next.js RSC headers
      proxy_set_header RSC $http_rsc;
      proxy_set_header Next-Router-State-Tree $http_next_router_state_tree;
      proxy_set_header Next-Router-Prefetch $http_next_router_prefetch;
      proxy_set_header Next-Url $http_next_url;

      # Next.js streaming requires these settings
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_cache off;

      # Timeouts for long requests
      proxy_read_timeout 300s;
      proxy_connect_timeout 75s;
      proxy_send_timeout 300s;

      # Don't compress responses (critical for RSC)
      proxy_set_header Accept-Encoding "";
    }
  }
}
