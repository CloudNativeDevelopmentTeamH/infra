apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  namespace: {{ .Values.namespace | quote  }}
type: Opaque
data:
  # Database configuration
  DB_USERNAME: {{ .Values.secrets.values.DB_USERNAME | quote }}
  DB_PASSWORD: {{ .Values.secrets.values.DB_PASSWORD | quote }}

  # Application configuration
  JWT_SECRET: {{ .Values.secrets.values.JWT_SECRET | quote }}
  PEPPER: {{ .Values.secrets.values.PEPPER | quote }}

  # RabbitMQ configuration
  RABBITMQ_USER: {{ .Values.secrets.values.RABBITMQ_USER | quote }}
  RABBITMQ_PASSWORD: {{ .Values.secrets.values.RABBITMQ_PASSWORD | quote }}

  # Email configuration
  SMTP_USER: {{ .Values.secrets.values.SMTP_USER | quote }}
  SMTP_PASS: {{ .Values.secrets.values.SMTP_PASS | quote }}
  SMTP_HOST: {{ .Values.secrets.values.SMTP_HOST | quote }}
  SMTP_PORT: {{ .Values.secrets.values.SMTP_PORT | quote }}
  SMTP_FROM: {{ .Values.secrets.values.SMTP_FROM | quote }}
