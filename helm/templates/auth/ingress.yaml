apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: auth-ingress
  namespace: {{ .Values.namespace | quote  }}
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`auth.localhost`)
      services:
        - name: "{{ .Values.auth.name }}-service"
          port: {{ .Values.auth.port }}
---

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rabbitmq-ingress
  namespace: {{ .Values.namespace | quote  }}
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`rabbitmq.localhost`)
      services:
        - name: "{{ .Values.rabbitmq.serviceName }}-service"
          port: {{ .Values.rabbitmq.managementPort }}
          